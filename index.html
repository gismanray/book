<html>
<head>
<title>Programming for ArcGIS Desktop Add-Ins</title>
<style type="text/css">
#box { position:relative; width:600px; height:800px; border:0px solid red; }
#book { position:absolute; top:0px; left:10px; width:578px; height:765px; border:1px gray solid; box-shadow:6px 6px 12px #888888; }
#cont { position:absolute; left:20px; top:25px; width:100%; height:100%; border:none; overflow:hidden; display:none; }
#city { position:absolute; left:5px; top:5px; width:568px; }

#page { position:absolute; top:0px; left:605px; width: 612px; height: 765px; display:none; box-shadow:6px 6px 12px #888888;}
.ttl { position:absolute; text-shadow:1px 1px 5px #000; }
.lnk { color:white; text-decoration:none; cursor:pointer;}
.lnk:hover { color:red; }
</style>
<script type="text/javascript">
function openbook() {
	document.getElementById("box").style.width = "1230px";
	document.getElementById("cover").style.display = "none";
	var cont = document.getElementById("cont");
	cont.src = "toc.html";
	cont.style.display = "block";
	var page = document.getElementById("page");
	page.style.display = "block";
}
</script>
</head>
<body oncontextmenu="return false">
<center>
<div id="box">
<div id="book">
	<iframe id="cont"></iframe>
	<div id="cover">
		<img id="city" src="images/city.jpg">
		<div id="banr">
			<span class="ttl" style="left:20px; top:10px; font-family:arial; font-style:italic; font-size:17.5pt; font-weight:bold; color:#ffffff;">Programming for ArcGIS Desktop Add-Ins</span>
			<span class="ttl" style="left:20px; top:40px; color:#ffffff; font-family:times; font-size:15pt; font-weight:bold; ">with ArcObjects and VB.NET</span>

		<div style="position:absolute; left:0px; top: 540px; height:60px; width:100%; background-color:#999999;">
			<center><span style="position:relative; top:22px;" class="lnk" onclick="openbook()">OPEN</span></center>
		</div>
	</div>
</div>
<iframe id="page" src="pdf/Chapter00.pdf#toolbar=0" oncontextmenu="return false"></iframe>
</div>
</center>
</body>
</html>
