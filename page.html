<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Page Viewer</title>

<!-- PDF.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
	body {
		font-family: Arial, sans-serif;
		background: #f4f4f4;
		display: flex;
		flex-direction: column;
		align-items: center;
		margin: 0;
		padding: 20px;
	}

	h1 { margin-bottom: 10px; }

	#controls {
		margin-bottom: 15px;
		margin-left: -120px;
	}

	input {
		padding: 2px;
		font-size: 14px;
		width: 30px;
		text-align: center;
	}

	canvas {
		border: 1px solid #ccc;
		background: white;
		box-shadow: 0 0 10px rgba(0,0,0,0.1);
	}
</style>
<script src="book.js"></script>
</head>
<body oncontextmenu="return flase;">
	  
	<div id="controls">
		<span id="lbl"></span>&nbsp;
		<img id="btnL" src="images/btn-l1.png" title="Previous page" style="position:relative; width:28px; top:10px;">
		<input type="text" id="pnum" value="1">
		<img id="btnR" src="images/btn-r1.png" title="Next page" style="position:relative; width:28px; top:10px;">
	</div>
  
  <canvas id="pdfCanvas"></canvas>

</body>
</html>
