<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Page Viewer</title>

  <!-- PDF.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #controls {
      margin-bottom: 15px;
    }

    input {
      padding: 5px;
      font-size: 16px;
      width: 70px;
      text-align: center;
    }

    button {
      padding: 6px 10px;
      font-size: 14px;
      margin-left: 5px;
      cursor: pointer;
    }

    canvas {
      border: 1px solid #ccc;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>

  <script>
    var url = null;
    var pdfDoc = null;
    var canvas = null;
    var ctx = null;
    var pageNum = 1;

    window.onload = main;
    
    function main() {
      url = "pdf/Chapter00.pdf";
      canvas = document.getElementById("pdfCanvas");
      ctx = canvas.getContext("2d");
      
      // Load PDF
      pdfjsLib.getDocument(url).promise.then(function(pdf) {
          pdfDoc = pdf;
          //renderPage(); // Render initial page
      });

      pageNum = parseInt(document.getElementById("pageNumber").value);
      renderPage();
    }
    
    

    function renderPage() {
      //const pageNum = parseInt(document.getElementById("pageNumber").value);
      console.log("Page number: " + pageNum);
      console.log("pdfDoc: " + pdfDoc);
      
      if (!pdfDoc || pageNum < 1 || pageNum > pdfDoc.numPages) {
         alert("Invalid page number");
         return;
      } 

      pdfDoc.getPage(pageNum).then(function(page) {
        const scale = 1.40;
        const viewport = page.getViewport({ scale: scale });

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        const renderContext = {
          canvasContext: ctx,
          viewport: viewport
        };

        page.render(renderContext);
      });
    }
  </script>
</head>
<body>

  <h1>PDF Page Viewer</h1>

  <div id="controls">
    Page:
    <input type="number" id="pageNumber" value="1" min="1">
    <button onclick="renderPage()">Go</button>
  </div>

  <canvas id="pdfCanvas"></canvas>

</body>
</html>
