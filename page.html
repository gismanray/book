<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Page Viewer</title>

<!-- PDF.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
	body {
		font-family: Arial, sans-serif;
		background: #f4f4f4;
		display: flex;
		flex-direction: column;
		align-items: center;
		margin: 0;
		padding: 20px;
	}

	h1 { margin-bottom: 10px; }

	#header {
		position: relative;
		width: 856px; height:36px;
		margin-bottom: 10px;
		border: 0px solid red;
	}
	#chlbl {
		position: absolute;
		left:5px; top:10px;
	}
	.nav {
		position: absolute;
		width: 120px;
		height:30px;
		top: 2px;
		right: 5px;
		border: 0px green solid;
	}

	input {
		padding: 2px;
		font-size: 14px;
		width: 30px;
		text-align: center;
	}

	canvas {
		border: 1px solid #ccc;
		background: white;
		box-shadow: 0 0 10px rgba(0,0,0,0.1);
	}
</style>
<script src="pages.js"></script>
</head>
<body oncontextmenu="return flase;">
	<div id="header">
		<span id="chlbl"></span>
		<div class="nav">
			<img id="btnR" src="images/btn-r1.png" title="Next page" style="width:28px; display: inline-block; float:right;">
			<input type="text" id="pnum" value="1" style="display:inline-block; float:right; width:32px; height:15px; margin-top:3px; margin-left:5px; margin-right:5px;">
			<img id="btnL" src="images/btn-l1.png" title="Previous page" style="width:28px; display: inline-block; float:right;">
		</div>
	</div>
  
  <canvas id="pdfCanvas"></canvas>

</body>
</html>
